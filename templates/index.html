<!DOCTYPE html>
<html>
    <head>
        <title>Feedback System</title>

        <style>
        body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    margin: 0;
}

.container {
    width: 40%;
    margin: auto;
    margin-top: 50px;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 0px 10px gray;
}

h2, h3 {
    text-align: center;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.feedback {
    background: #f1f1f1;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
}
</style>
    </head>
    <body>
    <h2> Feedback Form</h2>

    <form method = "POST" action="/feedback">
        <input type="text" name="name"
    placeholder="Your Name" required>
        <br><br>
        <input type="email" name="email"
    placeholder="Your Email" required>
        <br><br>
        <input type="number" name="rating"
    placeholder="Rating (1-5)" min="1" max="5" required>
        <br><br>

        <textarea name="message"
    placeholder="Your Message" required></textarea>
        <br><br>

        <button typ="submit">Send</button>
    </form>

    <hr>

    <h3> All Feedbacks</h3>

    {% for f in feedbacks %}
        <p><b>{{ f.name}}</b> -{{ f.message}}</p>
        {% endfor%}

        


    </body>
</html>
