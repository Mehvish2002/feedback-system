<!DOCTYPE html>
<html>
<head>
    <title>Feedback System</title>

    <style>
    /* Styling for the whole page */
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
        margin: 0;
    }

    /* Main container box */
    .container {
        width: 40%;
        margin: auto;
        margin-top: 50px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0px 0px 10px gray;
    }

    /* Center the heading */
    h2 {
        text-align: center;
    }

    /* Styling for input fields and textarea */
    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    /* Button styling */
    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    /* Button hover effect */
    button:hover {
        background: #45a049;
    }

    /* Success message style (optional) */
    .success {
        text-align: center;
        color: green;
        margin-top: 10px;
    }
    </style>
</head>

<body>

<!-- Main container -->
<div class="container">

    <!-- Page title -->
    <h2>Feedback Form</h2>

    <!-- Feedback form -->
    <form method="POST" action="/feedback">

        <!-- Input field for user name -->
        <input type="text" name="name" placeholder="Your Name" required>

        <!-- Input field for email -->
        <input type="email" name="email" placeholder="Your Email" required>

        <!-- Input field for rating (1 to 5) -->
        <input type="number" name="rating" placeholder="Rating (1-5)" min="1" max="5" required>

        <!-- Text area for message -->
        <textarea name="message" placeholder="Your Message" required></textarea>

        <!-- Submit button to send feedback -->
        <button type="submit">Send Feedback</button>

    </form>

</div>

</body>
</html>
