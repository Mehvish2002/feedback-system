<!DOCTYPE html>
<html>
<head>
    <title>Feedback System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            width: 40%;
            margin: auto;
            margin-top: 60px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2c3e50;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1a252f;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            text-decoration: none;
            color: #2c3e50;
            font-size: 14px;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Title -->
    <h2>Feedback Form</h2>

    <!-- Form -->
    <form method="POST" action="/feedback">

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <input type="number" name="rating" placeholder="Rating (1-5)" min="1" max="5" required>

        <textarea name="message" placeholder="Your Message" required></textarea>

        <button type="submit">Submit Feedback</button>

    </form>

    <!-- Admin link -->
    <div class="link">
        <a href="/admin">Go to Admin Panel</a>
    </div>

</div>

</body>
</html>
