<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

<!-- Heading for admin page -->
<h2>Admin Panel</h2>

<!-- Loop through all feedbacks -->
{% for f in feedbacks %}

    <!-- Each feedback card -->
    <div class="feedback">

        <!-- Display user name -->
        <b>{{ f[1] }} <!-- name --> </b><br>

        <!-- Display rating as stars -->
        {% for i in range(f[3]|int) %}
            ⭐
        {% endfor %}

        <br>

        <!-- Display user message -->
        {{ f[4] }} <!-- message --> <br>

        <a href = "/edit/ {{f[0]}}">Edit</a>
        <!-- Delete button (calls delete route with feedback id) -->
        <a href="/delete/{{ f[0] }}">Delete</a>

    </div>

    <!-- Line separator between feedbacks -->
    <hr>

{% endfor %}

</body>
</html>
