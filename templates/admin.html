<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <style>
        /* Page background and font styling */
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        /* Main container for admin panel */
        .container {
            width: 50%;
            margin: auto;
            margin-top: 40px;
        }

        /* Heading styling */
        h2 {
            text-align: center;
            color: #2c3e50;
        }

        /* Each feedback card styling */
        .feedback {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            border-left: 5px solid #2c3e50;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
        }

        /* User name styling */
        .name {
            font-weight: bold;
            font-size: 16px;
        }

        /* Feedback message styling */
        .message {
            margin-top: 8px;
            color: #555;
        }

        /* Buttons container */
        .actions {
            margin-top: 10px;
        }

        /* Common button styling */
        .btn {
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
            margin-right: 5px;
        }

        /* Edit button style */
        .edit {
            background: #2c3e50;
            color: white;
        }

        /* Delete button style */
        .delete {
            background: #7f8c8d;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Page Title -->
    <h2>Admin Panel</h2>

    <!-- Loop through all feedbacks from backend -->
    {% for f in feedbacks %}

        <!-- Single feedback card -->
        <div class="feedback">

            <!-- Display user name -->
            <div class="name">{{ f[1] }}</div>

            <!-- Display star rating -->
            <div>
                {% for i in range(f[3]) %}
                    ⭐
                {% endfor %}
            </div>

            <!-- Display feedback message -->
            <div class="message">{{ f[4] }}</div>

            <!-- Action buttons -->
            <div class="actions">

                <!-- Edit feedback -->
                <a href="/edit/{{ f[0] }}" class="btn edit">Edit</a>

                <!-- Delete feedback -->
                <a href="/delete/{{ f[0] }}" class="btn delete">Delete</a>

            </div>

        </div>

    {% endfor %}

</div>

</body>
</html>
